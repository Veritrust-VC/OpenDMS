server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    location /api/ { proxy_pass http://api:8002; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /docs { proxy_pass http://api:8002; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://api:8002; }
    location / { try_files $uri $uri/ /index.html; }
}

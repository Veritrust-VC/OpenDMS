services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opendms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opendms}
      POSTGRES_DB: opendms
    ports:
      - "127.0.0.1:${DB_PORT:-15433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-16379}:6379"

  sdk:
    build:
      context: ${SDK_PATH:-/home/VeriDocs-SDK}
    ports:
      - "127.0.0.1:${SDK_PORT:-13100}:3100"
    environment:
      PORT: "3100"
      SECRET_KEY: ${SECRET_KEY}
      ORG_DID: ${ORG_DID:-}
      REGISTRY_URL: http://veridocs-register-api-1:8001
      REGISTRY_API_KEY: ${REGISTRY_API_KEY:-}
      REGISTRY_DOMAIN: ${REGISTRY_DOMAIN:-register.opendms.dev}
      SIGNING_MODE: ${SIGNING_MODE:-local}
      VERAMO_API_KEY: ${VERAMO_API_KEY:-}
      VC_HOST_BASE: ${VC_HOST_BASE:-https://sdk.opendms.dev}
      CONTEXT_ORIGIN: ${CONTEXT_ORIGIN:-https://sdk.opendms.dev}
    volumes:
      - sdk-data:/app/status-data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - veridocs-register_default

  api:
    build:
      context: .
      target: development
    ports:
      - "127.0.0.1:${API_PORT:-18002}:8002"
    environment:
      OPENDMS_DATABASE_URL: postgresql://opendms:${DB_PASSWORD:-opendms}@db:5432/opendms
      OPENDMS_REDIS_URL: redis://redis:6379
      OPENDMS_SDK_URL: http://sdk:3100
      OPENDMS_SDK_API_KEY: ${VERAMO_API_KEY:-}
      OPENDMS_SDK_ENABLED: "true"
      OPENDMS_STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      OPENDMS_STORAGE_LOCAL_PATH: /data/documents
      OPENDMS_STORAGE_S3_ENDPOINT: ${S3_ENDPOINT:-}
      OPENDMS_STORAGE_S3_BUCKET: ${S3_BUCKET:-opendms-documents}
      OPENDMS_STORAGE_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      OPENDMS_STORAGE_S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      OPENDMS_JWT_SECRET: ${JWT_SECRET}
      OPENDMS_SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@opendms.local}
      OPENDMS_SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-admin}
      OPENDMS_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      sdk:
        condition: service_started
    volumes:
      - ./src:/app/src
      - doc-storage:/data/documents
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-28080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  sdk-data:
  doc-storage:

networks:
  veridocs-register_default:
    external: true

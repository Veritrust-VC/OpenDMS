version: "3.9"

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opendms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opendms}
      POSTGRES_DB: opendms
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendms"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── VeriDocs SDK Sidecar ──
  sdk:
    build:
      context: ${SDK_PATH:-../VeriDocs-SDK}
    ports:
      - "${SDK_PORT:-3100}:3100"
    environment:
      PORT: "3100"
      SECRET_KEY: ${SECRET_KEY:-29739248cad1bd1a0fc4d9b75cd4d2990de535baf5caadfdf8d8f86664aa830c}
      ORG_DID: ${ORG_DID:-}
      REGISTRY_URL: ${REGISTRY_URL:-http://host.docker.internal:8001}
      REGISTRY_API_KEY: ${REGISTRY_API_KEY:-}
      REGISTRY_DOMAIN: ${REGISTRY_DOMAIN:-localhost%3A8001}
      SIGNING_MODE: ${SIGNING_MODE:-local}
      VERAMO_API_KEY: ${VERAMO_API_KEY:-}
      VC_HOST_BASE: ${VC_HOST_BASE:-http://localhost:3100}
      CONTEXT_ORIGIN: http://localhost:3100
    volumes:
      - sdk-data:/app/status-data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── OpenDMS API ──
  api:
    build:
      context: .
      target: development
    ports:
      - "${API_PORT:-8002}:8002"
    environment:
      OPENDMS_DATABASE_URL: postgresql://opendms:${DB_PASSWORD:-opendms}@db:5432/opendms
      OPENDMS_REDIS_URL: redis://redis:6379
      OPENDMS_SDK_URL: http://sdk:3100
      OPENDMS_SDK_API_KEY: ${VERAMO_API_KEY:-}
      OPENDMS_SDK_ENABLED: "true"
      OPENDMS_STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      OPENDMS_STORAGE_LOCAL_PATH: /data/documents
      OPENDMS_STORAGE_S3_ENDPOINT: ${S3_ENDPOINT:-}
      OPENDMS_STORAGE_S3_BUCKET: ${S3_BUCKET:-opendms-documents}
      OPENDMS_STORAGE_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      OPENDMS_STORAGE_S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      OPENDMS_JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OPENDMS_SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@opendms.local}
      OPENDMS_SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-admin}
      OPENDMS_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - doc-storage:/data/documents
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
ports:
      - "${FRONTEND_PORT:-18080}:80"
    depends_on:
      - api

volumes:
  pgdata:
  sdk-data:
  doc-storage:
